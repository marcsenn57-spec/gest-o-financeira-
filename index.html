<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLCLARAGABI - Gestão</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --warning: #ffc107; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; }
        
        #telaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--dark); }
        .login-box { background: white; padding: 30px; border-radius: 15px; color: #333; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
      .btn-google { 
            background: black; 
            color: #444; 
            border: 1px solid #ddd; 
            display: inline-flex; /* Mudado para inline-flex */
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            width: auto; /* Largura automática */
            margin: 15px auto 0 auto; /* Centralizado horizontalmente */
            cursor: pointer; 
            border-radius: 5px; 
            padding: 6px 12px; /* Padding menor */
            font-size: 13px; /* Fonte menor */
            font-weight: 500;
        }
        .btn-google img { width: 18px; } /* Ícone menor */

        #sistemaConteudo { display: none; padding: 10px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; color: #333; height: 95vh; display: flex; flex-direction: column; }
        
        .dashboard-geral { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .card-geral { flex: 1; min-width: 150px; padding: 10px; border-radius: 10px; color: white; text-align: center; }
        .bg-receita { background: #20c997; }
        .bg-dividas { background: #6610f2; }
        .bg-restante { background: #fd7e14; }
        .card-geral span { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; }

        .grid-form { display: grid; grid-template-columns: 2fr 1fr 2fr auto; gap: 8px; margin-bottom: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .grid-form input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .btn { padding: 10px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; font-size: 10px; }
        
        /* BARRA DE PESQUISA */
        .search-container { margin-bottom: 10px; position: relative; }
        .search-container input { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 8px; box-sizing: border-box; font-size: 14px; }

        /* LISTA RESPONSIVA COM ROLAGEM */
        #areaRelatorio { flex-grow: 1; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; z-index: 5; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .obs-text { display: block; font-size: 11px; color: #666; font-style: italic; margin-top: 4px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 600px; border-radius: 15px; color: #333; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }

        .item-linha { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }

        @media (max-width: 600px) {
            .grid-form { grid-template-columns: 1fr; }
            .container { height: auto; }
            #areaRelatorio { max-height: 400px; }
        }

        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .container { height: auto; }
            #areaRelatorio { overflow: visible; }
        }
    </style>
</head>
<body>

<div id="telaLogin" class="no-print">
    <div class="login-box">
        <h2 id="authTitulo">Acesso ao Sistema</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn" style="background:var(--primary); width:100%; padding:14px;" onclick="entrar()">ENTRAR</button>
        <button class="btn btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar com Google
        </button>
        <p style="font-size: 12px; margin-top: 20px;">
            <a href="#" id="linkAlternar" onclick="alternarAuth()">Ainda não tem conta? Cadastre-se</a>
        </p>
    </div>
</div>

<div id="sistemaConteudo">
    <div class="container">
        <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:10px;">
            <div>
                <h2 style="margin:0; font-size: 18px;">Marcelo Sena</h2>
                <small id="userEmail" style="color: #666;"></small>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="btn" style="background:var(--dark)" onclick="gerarRelatorioExtrato()">📄 Extrato</button>
                <input type="number" id="valorReceitaBase" style="width:80px; padding:8px; border:1px solid #ddd; border-radius:5px" onchange="salvarReceita(this.value)" placeholder="Receita">
                <button class="btn" style="background:var(--danger)" onclick="sair()">SAIR</button>
            </div>
        </div>

        <div class="dashboard-geral no-print">
            <div class="card-geral bg-receita">RECEITA <span>R$ <small id="displayReceita">0,00</small></span></div>
            <div class="card-geral bg-dividas">DÍVIDAS <span>R$ <small id="totalDividas">0,00</small></span></div>
            <div class="card-geral bg-restante" id="cardSaldo">SALDO <span>R$ <small id="saldoRestante">0,00</small></span></div>
        </div>

        <div class="grid-form no-print">
            <input type="hidden" id="editFornecedorId">
            <input type="text" id="nomeCompra" placeholder="FORNECEDOR">
            <input type="text" id="docCompra" placeholder="DOC">
            <input type="text" id="obsCompra" placeholder="OBSERVAÇÃO">
            <div style="display: flex; gap: 5px;">
                <button class="btn" id="btnAdicionar" style="background:var(--primary); flex: 1;" onclick="adicionarCompra()">ADICIONAR</button>
                <button class="btn" id="btnCancelarEdicao" style="background:#6c757d; display:none;" onclick="cancelarEdicaoFornecedor()">X</button>
            </div>
        </div>

        <!-- BARRA DE PESQUISA ADICIONADA -->
        <div class="search-container no-print">
            <input type="text" id="inputBusca" placeholder="🔍 Pesquisar fornecedor ou documento..." onkeyup="renderizarTabela()">
        </div>

        <div id="areaRelatorio">
            <table>
                <thead><tr><th>Fornecedor / Obs</th><th>Doc</th><th>Valor</th><th class="no-print">Ações</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL DE DETALHES DOS ITENS -->
<div id="modalDetalhes" class="modal no-print">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2 id="detalheNome" style="margin-top:0; font-size: 20px;">Detalhes</h2>
        <div style="display:flex; gap:10px; margin-bottom: 20px; flex-wrap: wrap;">
            <input type="hidden" id="editItemId">
            <input type="text" id="novoItemNome" placeholder="Item" style="flex:2; padding:10px; border:1px solid #ddd; border-radius:6px;">
            <input type="number" id="novoItemValor" placeholder="R$" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:6px;">
            <button class="btn" id="btnSalvarItem" style="background:var(--warning); color:#000;" onclick="registrarItem()">LANÇAR</button>
            <button class="btn" id="btnCancelarEditItem" style="background:#6c757d; display:none;" onclick="cancelarEdicaoItem()">CANCELAR</button>
        </div>
        <div id="listaItens" style="border:1px solid #eee; border-radius:8px; max-height: 300px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDvKY08rpGsMjNV1pKRPmEi9o6blgTWZA0",
        authDomain: "gestao-contas-7d505.firebaseapp.com",
        databaseURL: "https://gestao-contas-7d505-default-rtdb.firebaseio.com",
        projectId: "gestao-contas-7d505",
        storageBucket: "gestao-contas-7d505.firebasestorage.app",
        messagingSenderId: "636549454847",
        appId: "1:636549454847:web:148dcf5361fdcfe300e5ca",
        measurementId: "G-9NCFQLT059"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let usuarioLogado = null;
    let modoCadastro = false;
    let listaCompras = [];
    let idAtivo = null;

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert("Erro Google: " + err.message));
    }

    function entrar() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        if(modoCadastro) {
            auth.createUserWithEmailAndPassword(e, s).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(e, s).catch(err => alert("E-mail ou senha incorretos."));
        }
    }

    function sair() { auth.signOut(); }

    function alternarAuth() {
        modoCadastro = !modoCadastro;
        document.getElementById('authTitulo').innerText = modoCadastro ? "Criar Nova Conta" : "Acesso ao Sistema";
        document.getElementById('linkAlternar').innerText = modoCadastro ? "Já tenho conta. Entrar" : "Ainda não tem conta? Cadastre-se";
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            usuarioLogado = user;
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('sistemaConteudo').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            carregarDados();
        } else {
            document.getElementById('telaLogin').style.display = 'flex';
            document.getElementById('sistemaConteudo').style.display = 'none';
        }
    });

    function carregarDados() {
        const path = 'usuarios/' + usuarioLogado.uid;
        db.ref(path + '/receita').on('value', snap => {
            const r = snap.val() || 0;
            document.getElementById('valorReceitaBase').value = r;
            document.getElementById('displayReceita').innerText = r.toFixed(2);
            calcularTudo();
        });
        db.ref(path + '/compras').on('value', snap => {
            const data = snap.val();
            listaCompras = data ? Object.entries(data).map(([key, value]) => ({...value, id: key})) : [];
            renderizarTabela();
            calcularTudo();
            if(idAtivo) atualizarModal(); 
        });
    }

    function salvarReceita(v) {
        db.ref('usuarios/' + usuarioLogado.uid + '/receita').set(parseFloat(v) || 0);
    }

    // FUNÇÃO DE RENDERIZAÇÃO COM FILTRO DE PESQUISA
    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        const termoBusca = document.getElementById('inputBusca').value.toUpperCase();
        corpo.innerHTML = '';
        
        listaCompras.forEach(c => {
            const nome = c.nome.toUpperCase();
            const doc = (c.doc || "").toUpperCase();
            
            // Verifica se o termo de busca está no nome ou no doc
            if (nome.includes(termoBusca) || doc.includes(termoBusca)) {
                const obsHtml = c.obs ? `<span class="obs-text">${c.obs}</span>` : '';
                corpo.innerHTML += `
                    <tr>
                        <td onclick="abrirDetalhes('${c.id}')" style="cursor:pointer;">
                            <strong>${c.nome}</strong>
                            ${obsHtml}
                        </td>
                        <td>${c.doc || '-'}</td>
                        <td style="color:red; font-weight:bold;">R$ ${(c.total || 0).toFixed(2)}</td>
                        <td class="no-print">
                            <div style="display:flex; gap:4px;">
                                <button class="btn" style="background:var(--success); padding:5px;" onclick="prepararEdicaoFornecedor('${c.id}', '${c.nome}', '${c.doc || ''}', '${c.obs || ''}')">EDITAR</button>
                                <button class="btn" style="background:var(--danger); padding:5px;" onclick="excluirCompra('${c.id}')">X</button>
                            </div>
                        </td>
                    </tr>`;
            }
        });
    }

    // --- FUNÇÕES DE FORNECEDOR ---

    function adicionarCompra() {
        const id = document.getElementById('editFornecedorId').value;
        const nome = document.getElementById('nomeCompra').value.toUpperCase();
        const doc = document.getElementById('docCompra').value;
        const obs = document.getElementById('obsCompra').value;

        if(!nome) return;

        const dados = { nome, doc, obs };
        const path = 'usuarios/' + usuarioLogado.uid + '/compras/';

        if(id) {
            db.ref(path + id).update(dados);
            cancelarEdicaoFornecedor();
        } else {
            const novoId = Date.now().toString();
            db.ref(path + novoId).set({...dados, total: 0});
        }

        limparCamposFornecedor();
    }

    function prepararEdicaoFornecedor(id, nome, doc, obs) {
        document.getElementById('editFornecedorId').value = id;
        document.getElementById('nomeCompra').value = nome;
        document.getElementById('docCompra').value = doc;
        document.getElementById('obsCompra').value = obs;
        document.getElementById('btnAdicionar').innerText = "SALVAR";
        document.getElementById('btnAdicionar').style.background = "var(--success)";
        document.getElementById('btnCancelarEdicao').style.display = "block";
        window.scrollTo(0, 0); 
    }

    function cancelarEdicaoFornecedor() {
        document.getElementById('editFornecedorId').value = "";
        document.getElementById('btnAdicionar').innerText = "ADICIONAR";
        document.getElementById('btnAdicionar').style.background = "var(--primary)";
        document.getElementById('btnCancelarEdicao').style.display = "none";
        limparCamposFornecedor();
    }

    function limparCamposFornecedor() {
        document.getElementById('nomeCompra').value = "";
        document.getElementById('docCompra').value = "";
        document.getElementById('obsCompra').value = "";
    }

    function excluirCompra(id) {
        if(confirm("Excluir fornecedor e todos os itens dele?")) {
            db.ref('usuarios/' + usuarioLogado.uid + '/compras/' + id).remove();
        }
    }

    function calcularTudo() {
        let totalD = 0;
        listaCompras.forEach(c => totalD += (c.total || 0));
        const rec = parseFloat(document.getElementById('valorReceitaBase').value) || 0;
        const saldo = rec - totalD;
        document.getElementById('totalDividas').innerText = totalD.toFixed(2);
        document.getElementById('saldoRestante').innerText = saldo.toFixed(2);
        document.getElementById('cardSaldo').style.background = saldo < 0 ? 'var(--danger)' : '#fd7e14';
    }

    // --- FUNÇÕES DE ITENS (MODAL) ---

    function abrirDetalhes(id) {
        idAtivo = id;
        atualizarModal();
        document.getElementById('modalDetalhes').style.display = "block";
    }

    function atualizarModal() {
        const c = listaCompras.find(x => x.id === idAtivo);
        if(!c) { fecharModal(); return; }
        document.getElementById('detalheNome').innerText = c.nome;
        const lista = document.getElementById('listaItens');
        lista.innerHTML = "";
        if(c.itens) {
            Object.entries(c.itens).forEach(([key, i]) => {
                lista.innerHTML += `
                <div class="item-linha">
                    <span style="flex:2">${i.nome}</span>
                    <strong style="flex:1">R$ ${i.valor.toFixed(2)}</strong>
                    <div style="display:flex; gap:5px;">
                        <button class="btn" style="background:var(--primary); padding:4px 8px;" onclick="prepararEdicaoItem('${key}', '${i.nome}', ${i.valor})">EDIT</button>
                        <button class="btn" style="background:var(--danger); padding:4px 8px;" onclick="excluirItem('${key}')">X</button>
                    </div>
                </div>`;
            });
        }
    }

    function registrarItem() {
        const n = document.getElementById('novoItemNome').value;
        const v = parseFloat(document.getElementById('novoItemValor').value);
        const editId = document.getElementById('editItemId').value;
        if(!n || isNaN(v)) return;
        
        const path = 'usuarios/' + usuarioLogado.uid + '/compras/' + idAtivo;
        if(editId) {
            db.ref(path + '/itens/' + editId).update({ nome: n, valor: v }).then(recalcularTotalCompra);
            cancelarEdicaoItem();
        } else {
            db.ref(path + '/itens').push({ nome: n, valor: v }).then(recalcularTotalCompra);
        }
        document.getElementById('novoItemNome').value = "";
        document.getElementById('novoItemValor').value = "";
    }

    function recalcularTotalCompra() {
        const path = 'usuarios/' + usuarioLogado.uid + '/compras/' + idAtivo;
        db.ref(path + '/itens').once('value', snap => {
            let t = 0; snap.forEach(i => { t += i.val().valor; });
            db.ref(path + '/total').set(t);
        });
    }

    function prepararEdicaoItem(key, nome, valor) {
        document.getElementById('editItemId').value = key;
        document.getElementById('novoItemNome').value = nome;
        document.getElementById('novoItemValor').value = valor;
        document.getElementById('btnSalvarItem').innerText = "OK";
        document.getElementById('btnSalvarItem').style.background = "var(--success)";
        document.getElementById('btnCancelarEditItem').style.display = "inline-block";
    }

    function cancelarEdicaoItem() {
        document.getElementById('editItemId').value = "";
        document.getElementById('novoItemNome').value = "";
        document.getElementById('novoItemValor').value = "";
        document.getElementById('btnSalvarItem').innerText = "LANÇAR";
        document.getElementById('btnSalvarItem').style.background = "var(--warning)";
        document.getElementById('btnCancelarEditItem').style.display = "none";
    }

    function excluirItem(itemKey) {
        if(confirm("Excluir item?")) {
            db.ref('usuarios/' + usuarioLogado.uid + '/compras/' + idAtivo + '/itens/' + itemKey).remove().then(recalcularTotalCompra);
        }
    }

    function fecharModal() { document.getElementById('modalDetalhes').style.display = "none"; idAtivo = null; cancelarEdicaoItem(); }

    function gerarRelatorioExtrato() {
        const dataAtual = new Date().toLocaleDateString('pt-BR');
        const receita = parseFloat(document.getElementById('valorReceitaBase').value) || 0;
        let totalD = 0;
        listaCompras.forEach(c => totalD += (c.total || 0));
        const saldo = receita - totalD;
        const janelaImpressao = window.open('', '', 'width=900,height=700');
        let html = `<html><head><title>Extrato</title><style>body{font-family:Arial;padding:20px} table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #ccc;padding:10px;text-align:left} .neg{color:red}</style></head><body>`;
        html += `<h2>EXTRATO FINANCEIRO - Marcelo Sena</h2><p>Data: ${dataAtual}</p>`;
        html += `<table><thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th></tr></thead><tbody>`;
        html += `<tr><td>RECEITA INICIAL</td><td>CRÉDITO</td><td>R$ ${receita.toFixed(2)}</td></tr>`;
        listaCompras.forEach(c => {
            html += `<tr><td>${c.nome} ${c.doc ? '['+c.doc+']' : ''}</td><td>DÉBITO</td><td class="neg">- R$ ${c.total.toFixed(2)}</td></tr>`;
        });
        html += `</tbody></table><h3>SALDO FINAL: R$ ${saldo.toFixed(2)}</h3></body></html>`;
        janelaImpressao.document.write(html);
        janelaImpressao.document.close();
        janelaImpressao.print();
    }
</script>
</body>
</html>
